name: Dump Repo Code (Clean)

on:
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install tree
        run: sudo apt-get update && sudo apt-get install -y tree

      - name: Generate super clean code dump
        run: |
          TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S UTC")
          COMMIT_SHA=${{ github.sha }}
          OUTPUT="repo_dump_$(date +%Y%m%d_%H%M%S).md"

          cat > "$OUTPUT" << EOF
# DeFi-core / NOFACE Protocol - Clean Code Dump
Generated on: $TIMESTAMP
Commit: $COMMIT_SHA
Branch: ${{ github.ref_name }}

## 📁 Full Directory Structure
\`\`\`bash
EOF

          tree -I '.git|node_modules|out|cache|broadcast|dist|build|target' -a --dirsfirst >> "$OUTPUT" || true
          echo '```' >> "$OUTPUT"
          echo -e "\n## 📄 All Source & Config Files\n" >> "$OUTPUT"

          # Only tracked files → zero junk, zero binaries
          git ls-files --recurse-submodules | sort | while read -r file; do
            echo -e "\n\n---\n\n### 📄 File: \`$file\`" >> "$OUTPUT"
            
            ext="\${file##*.}"
            case "\$ext" in
              sol) lang="solidity" ;;
              nr)  lang="noir" ;;
              js)  lang="javascript" ;;
              ts)  lang="typescript" ;;
              json) lang="json" ;;
              toml) lang="toml" ;;
              md)  lang="markdown" ;;
              sh)  lang="bash" ;;
              yml|yaml) lang="yaml" ;;
              *)   lang="text" ;;
            esac

            echo "\`\`\`\${lang}" >> "$OUTPUT"
            cat "\$file" >> "$OUTPUT" 2>/dev/null || echo "# Could not read file" >> "$OUTPUT"
            echo -e "\`\`\`\n" >> "$OUTPUT"
          done

          echo "✅ Dump complete → $OUTPUT"

      - name: Upload clean dump as artifact
        uses: actions/upload-artifact@v4
        with:
          name: NOFACE-clean-code-dump
          path: repo_dump_*.md
          retention-days: 30
