name: Generate Codebase Dump

on:
  workflow_dispatch:

jobs:
  dump-codebase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Plain Text Dump
        # Changed --exclude to --ignore and updated include syntax
        run: |
          npx repomix --output codebase-dump.txt --include "." --ignore "package-lock.json,yarn.lock,*.png,*.jpg,*.pdf,node_modules/**"

      - name: Upload Dump as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: full-project-context
          path: codebase-dump.txt
          retention-days: 1
