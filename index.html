<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VielFi | The Privacy Kernel</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-glow"></div>

    <nav>
        <div class="logo">VIELFI</div>
        <button id="connectBtn" class="btn-connect">Connect Wallet</button>
    </nav>

    <header class="hero">
        <h1>Anonymity is a <br><span>Human Right</span></h1>
        <p>Institutional grade privacy for the Ethereum ecosystem. Shield your assets and transact with Zero-Knowledge proofs.</p>
    </header>

    <main class="main-app">
        <div class="vault-card">
            <div class="card-header">
                <h2>Shielded Vault</h2>
                <div style="font-size: 0.6rem; color: var(--accent-muted); margin-top: 0.5rem;" id="contractDisplay">
                    Vault: Not Connected
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="shield">Shield</button>
                <button class="tab-btn" data-tab="unshield">Unshield</button>
                <button class="tab-btn" data-tab="swap">Swap</button>
            </div>

            <div class="input-container">
                <div class="input-group">
                    <label>Amount (USDC)</label>
                    <div class="input-wrapper">
                        <input type="number" id="amountInput" placeholder="0.00" value="100">
                        <span class="asset-badge">USDC</span>
                    </div>
                </div>

                <div class="input-group">
                    <label>Nullifier / Commitment</label>
                    <div class="input-wrapper">
                        <input type="text" id="idInput" placeholder="Auto-generated" readonly>
                    </div>
                </div>

                <button class="btn-action" id="actionBtn">Connect Wallet</button>

                <div class="status-log" id="statusLog">
                    <div class="status-item">
                        <span>Status</span>
                        <span id="opStatus">Idle</span>
                    </div>
                    <div class="status-item">
                        <span>Privacy Set</span>
                        <span id="privacySet">Calculating...</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        © 2026 VIELFI PROTOCOL. BUILT WITH NOIR & BN254.
    </footer>

    <script src="https://cdn.ethers.io/lib/ethers-5.7.2.umd.min.js" type="application/javascript"></script>
    <script src="main.js"></script>

</body>
</html>
