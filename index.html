<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIELFI | The Privacy Kernel</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="shieldCanvas"></canvas>
    <div class="overlay"></div>

    <nav>
        <div class="brand">VIELFI // <span>CORE_V3</span></div>
        <div class="status-bar">
            <span id="networkStatus">NETWORK: SEPOLIA</span>
            <span id="shieldStatus">SHIELD: ACTIVE</span>
            <button id="connectBtn">CONNECT_IDENTITY</button>
        </div>
    </nav>

    <main>
        <div class="dashboard">
            <div class="side-panel">
                <div class="stat-card">
                    <label>TVL_SHIELDED</label>
                    <div class="value">$2,405,102.00</div>
                </div>
                <div class="stat-card">
                    <label>ANON_SET_SIZE</label>
                    <div class="value">1,024_NODES</div>
                </div>
                <div class="stat-card">
                    <label>ZK_PROV_TIME</label>
                    <div class="value">~1.4s</div>
                </div>
            </div>

            <div class="action-panel">
                <div class="tabs">
                    <button class="tab active" data-tab="deposit">SHIELD</button>
                    <button class="tab" data-tab="withdraw">UNSHIELD</button>
                    <button class="tab" data-tab="swap">PRIVATE_SWAP</button>
                </div>

                <div class="tab-content" id="depositContent">
                    <h2>SHIELD ASSETS</h2>
                    <div class="input-group">
                        <label>ASSET</label>
                        <select id="assetSelect">
                            <option value="USDC">USDC (6 Decimals)</option>
                            <option value="WETH">WETH (18 Decimals)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>DENOMINATION</label>
                        <div class="denom-selector">
                            <button class="denom active">100</button>
                            <button class="denom">1000</button>
                            <button class="denom">10000</button>
                        </div>
                    </div>
                    <button class="execute-btn" id="shieldBtn">EXECUTE_SHIELD_DEPOSIT</button>
                    <div class="terminal-output" id="shieldLog">
                        > INITIALIZING KERNEL...
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="noise"></div>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
